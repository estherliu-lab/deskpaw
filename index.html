<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#d9a76c" />
    <meta
      name="description"
      content="DeskPaw turns your pet photo into a warm mobile and desktop companion."
    />
    <link rel="manifest" href="/deskpaw/manifest.json" />
    <link rel="apple-touch-icon" href="/deskpaw/icons/icon-192.png" />
    <link rel="stylesheet" href="/deskpaw/app-assets/index.css" />
    <title>DeskPaw</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      const isLocal = ["localhost", "127.0.0.1", "::1"].includes(window.location.hostname);
      const hasBuiltEntry = document.querySelector('script[src="/deskpaw/app-assets/index.js"]');
      if (!isLocal && !hasBuiltEntry) {
        const appScript = document.createElement("script");
        appScript.type = "module";
        appScript.src = "/deskpaw/app-assets/index.js";
        document.body.appendChild(appScript);
      }
    </script>
  </body>
</html>
