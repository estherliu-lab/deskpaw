<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeskPaw Offline</title>
    <style>
      body {
        margin: 0;
        display: grid;
        min-height: 100vh;
        place-items: center;
        background: #fff8ef;
        color: #283034;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(90vw, 36rem);
        border: 1px solid rgba(40, 48, 52, 0.12);
        border-radius: 16px;
        background: #fffdf8;
        padding: 2rem;
        box-shadow: 0 18px 45px rgba(95, 70, 45, 0.14);
      }

      h1 {
        margin: 0 0 0.7rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>DeskPaw is resting offline</h1>
      <p>你现在处于离线状态。已经缓存的 DeskPaw 页面仍可继续打开。</p>
      <p>You are offline. Cached DeskPaw pages can still be opened.</p>
    </main>
  </body>
</html>
